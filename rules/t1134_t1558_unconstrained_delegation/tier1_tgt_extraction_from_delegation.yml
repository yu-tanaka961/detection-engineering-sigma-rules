title: TGT Extraction from Unconstrained Delegation Host
id: f7c3d9a1-1134-4de0-b8c7-unified-deleg02
related:
  - id: sigmahq-tgt-extraction
    type: derived
  - id: elastic-delegation-tgt-abuse
    type: derived
status: experimental
description: |
  Detects tools extracting cached TGTs from memory on unconstrained delegation
  hosts, including Rubeus monitor/triage/dump, Mimikatz sekurlsa::tickets,
  and Kekeo tgt::deleg. Attackers use these to impersonate any user that
  authenticates to the compromised delegation host.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1134/
  - https://attack.mitre.org/techniques/T1558/
  - https://github.com/GhostPack/Rubeus
  - https://dirkjanm.io/krbrelayx-unconstrained-delegation-abuse-toolkit/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1134
  - attack.t1558
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_rubeus_tgt:
    CommandLine|contains:
      - 'Rubeus'
      - 'rubeus'
    CommandLine|contains:
      - 'monitor'
      - 'triage'
      - 'dump'
      - 'harvest'
      - '/filteruser:'
      - '/targetuser:'
  selection_mimikatz_tickets:
    CommandLine|contains:
      - 'sekurlsa::tickets'
      - 'kerberos::list'
      - 'kerberos::tgt'
  selection_kekeo:
    CommandLine|contains:
      - 'tgt::deleg'
      - 'kekeo'
  selection_krbrelayx:
    CommandLine|contains:
      - 'krbrelayx'
      - 'printerbug'
      - 'SpoolSample'
      - 'DFSCoerce'
  condition: selection_rubeus_tgt or selection_mimikatz_tickets or selection_kekeo or selection_krbrelayx
falsepositives:
  - Security assessment tools during authorized penetration testing
level: critical
