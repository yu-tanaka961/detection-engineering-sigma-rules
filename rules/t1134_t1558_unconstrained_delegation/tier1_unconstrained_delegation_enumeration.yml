title: Unconstrained Delegation Enumeration Activity
id: f7c3d9a1-1134-4de0-b8c7-unified-deleg01
related:
  - id: sigmahq-delegation-enumeration
    type: derived
  - id: elastic-unconstrained-delegation
    type: derived
status: experimental
description: |
  Detects enumeration of unconstrained delegation accounts via LDAP queries,
  PowerView/ADModule, or BloodHound collection. Attackers enumerate accounts
  with TRUSTED_FOR_DELEGATION flag to identify targets for TGT extraction.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1134/
  - https://attack.mitre.org/techniques/T1558/
  - https://posts.specterops.io/hunting-in-active-directory-unconstrained-delegation-forests-trusts-71f2b33688e1
  - https://adsecurity.org/?p=1667
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1134
  - attack.t1558
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_powerview:
    CommandLine|contains:
      - 'Get-DomainComputer'
      - 'Get-NetComputer'
      - 'Get-ADComputer'
    CommandLine|contains:
      - 'Unconstrained'
      - 'TrustedForDelegation'
      - 'TRUSTED_FOR_DELEGATION'
      - '524288'
  selection_ldap_query:
    CommandLine|contains:
      - 'userAccountControl:1.2.840.113556.1.4.803:=524288'
      - '(userAccountControl:1.2.840.113556.1.4.803:=524288)'
  selection_bloodhound:
    CommandLine|contains:
      - 'SharpHound'
      - 'BloodHound'
      - 'Invoke-BloodHound'
      - 'bloodhound-python'
  condition: selection_powerview or selection_ldap_query or selection_bloodhound
falsepositives:
  - Legitimate AD administration and audit scripts
  - Security assessment tools
level: high
