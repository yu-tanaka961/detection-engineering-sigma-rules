title: Mshta/Rundll32/Regsvr32 Suspicious Proxy Execution
id: f7c3d9a1-2101-4de0-b8c7-unified-t1218
related:
    - id: a3b4c5d6-7e8f-9a0b-1c2d-3e4f5a6b7c8d  # SigmaHQ proxy execution
      type: derived
status: test
description: |
    Detects suspicious use of signed Microsoft binaries (mshta.exe,
    rundll32.exe, regsvr32.exe) to proxy execution of malicious code.
    These binaries are trusted by application whitelisting and can
    execute arbitrary scripts, DLLs, or remote content.
    Unified from:
    - SigmaHQ proc_creation_win_mshta_susp.yml, proc_creation_win_rundll32_susp.yml
    - Elastic defense_evasion_mshta.toml, defense_evasion_rundll32.toml
    - Splunk ESCU (Mshta Suspicious Execution, Rundll32 Proxy Execution)
    - Azure Sentinel (Suspicious Proxy Execution)
references:
    - https://attack.mitre.org/techniques/T1218/
    - https://attack.mitre.org/techniques/T1218/005/
    - https://attack.mitre.org/techniques/T1218/010/
    - https://attack.mitre.org/techniques/T1218/011/
    - https://lolbas-project.github.io/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.defense_evasion
    - attack.t1218
    - attack.t1218.005
    - attack.t1218.010
    - attack.t1218.011
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # mshta executing remote or inline scripts
    selection_mshta:
        Image|endswith: '\mshta.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'vbscript:'
            - 'http://'
            - 'https://'
            - '.hta'
            - 'about:blank'

    # rundll32 suspicious patterns
    selection_rundll32:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'http://'
            - 'https://'
            - '\\\\' # UNC path
            - 'shell32.dll,ShellExec_RunDLL'
            - 'url.dll,FileProtocolHandler'
            - 'zipfldr.dll,RouteTheCall'

    # rundll32 loading DLL from suspicious path
    selection_rundll32_path:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\Downloads\'
            - '\Desktop\'
            - '\ProgramData\'

    # regsvr32 remote or suspicious execution
    selection_regsvr32:
        Image|endswith: '\regsvr32.exe'
        CommandLine|contains:
            - '/s /n /u /i:http'
            - '/s /n /u /i:https'
            - 'scrobj.dll'
            - '/i:http'
            - '/i:https'
            - '/i:ftp'

    # regsvr32 loading from suspicious path
    selection_regsvr32_path:
        Image|endswith: '\regsvr32.exe'
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\Downloads\'

    condition: 1 of selection_*
falsepositives:
    - Legitimate software using mshta for HTA applications
    - Software using rundll32 for DLL registration
    - Application installers using regsvr32 for COM registration
level: high
