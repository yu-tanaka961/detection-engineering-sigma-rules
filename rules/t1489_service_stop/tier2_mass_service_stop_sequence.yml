title: Mass Service Stop Sequence Indicating Ransomware
id: f7c3d9a1-1489-4de0-b8c7-unified-t1489b01
status: experimental
description: |
  Detects rapid sequential stopping of multiple services, a strong indicator of
  ransomware pre-encryption activity designed to unlock files held by services.
  Unified detection logic from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel.
references:
  - https://attack.mitre.org/techniques/T1489/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.impact
  - attack.t1489
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-source.azure-sentinel
  - x-evasion-resistance.high
  - x-drs.dq-coverage
  - x-drs.ed-log-evasion-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_stop_cmd:
    - Image|endswith:
        - '\net.exe'
        - '\net1.exe'
      CommandLine|contains: 'stop'
    - Image|endswith: '\sc.exe'
      CommandLine|contains: 'stop'
    - Image|endswith: '\taskkill.exe'
      CommandLine|contains:
        - '/f'
        - '/im'
  filter_system:
    User|contains:
      - 'SYSTEM'
      - 'NT AUTHORITY'
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
  condition: selection_stop_cmd and not filter_system
  timeframe: 2m
  count:
    field: CommandLine
    gte: 5
falsepositives:
  - Batch service restart during maintenance windows
  - Very rare outside of ransomware scenarios
level: critical
x-log-requirement:
  source: Sysmon EventID 1 / Security 4688
  requirement: Process command line logging with temporal correlation
