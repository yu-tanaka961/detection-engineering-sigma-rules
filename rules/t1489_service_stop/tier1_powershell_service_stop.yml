title: Service Stop via PowerShell or WMI
id: f7c3d9a1-1489-4de0-b8c7-unified-t1489a02
status: experimental
description: |
  Detects PowerShell and WMI-based service stopping and disabling targeting critical
  infrastructure services, commonly used by ransomware operators.
  Unified detection logic from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel.
references:
  - https://attack.mitre.org/techniques/T1489/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.impact
  - attack.t1489
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_ps_stop:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Stop-Service'
      - 'Set-Service'
      - 'Disable-Service'
  selection_ps_target:
    CommandLine|contains:
      - '-StartupType Disabled'
      - 'Stopped'
      - '-Force'
  selection_wmi_service:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wmic.exe'
    CommandLine|contains:
      - 'Win32_Service'
      - 'StopService'
      - 'ChangeStartMode'
  selection_bulk_stop:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Get-Service'
      - 'ForEach'
      - 'Stop-Service'
  condition: (selection_ps_stop and selection_ps_target) or selection_wmi_service or selection_bulk_stop
falsepositives:
  - IT automation scripts for service management
  - Scheduled maintenance operations
level: high
x-log-requirement:
  source: Sysmon EventID 1 / Security 4688
  requirement: Process command line logging enabled
