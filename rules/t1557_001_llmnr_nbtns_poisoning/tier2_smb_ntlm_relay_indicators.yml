title: SMB/NTLM Relay Attack Indicators
id: f7c3d9a1-3103-4de0-b8c7-unified-t1557001
related:
    - id: c3d4e5f6-7a8b-unified-t1557001relay  # Elastic NTLM relay
      type: derived
status: test
description: |
    Detects indicators of NTLM relay attacks following LLMNR/NBT-NS
    poisoning. After capturing authentication, adversaries relay NTLM
    credentials to other services. This rule detects ntlmrelayx,
    MultiRelay, and suspicious NTLM authentication patterns from
    unexpected sources.
    Unified from:
    - Elastic credential_access_ntlm_relay.toml
    - SigmaHQ proc_creation_win_ntlm_relay.yml
    - Splunk ESCU (NTLM Relay Detection)
references:
    - https://attack.mitre.org/techniques/T1557/001/
    - https://attack.mitre.org/techniques/T1557/
    - https://github.com/fortra/impacket/blob/master/impacket/examples/ntlmrelayx.py
author: Yuhei Tanaka (Unified from Elastic, SigmaHQ, Splunk)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.lateral_movement
    - attack.t1557.001
    - x-source.elastic-detection-rules
    - x-source.sigmahq
    - x-source.splunk-escu
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # ntlmrelayx execution
    selection_ntlmrelayx:
        CommandLine|contains:
            - 'ntlmrelayx'
            - 'ntlmrelay'
            - 'MultiRelay'
            - 'smbrelayx'

    # Impacket relay tools
    selection_impacket_relay:
        CommandLine|contains:
            - '-tf '
            - '-smb2support'
            - '--delegate-access'
            - '-wh '
            - 'addcomputer'

    # PetitPotam / PrinterBug coercion
    selection_coercion:
        CommandLine|contains:
            - 'PetitPotam'
            - 'Coercer'
            - 'PrinterBug'
            - 'SpoolSample'
            - 'DFSCoerce'
            - 'ShadowCoerce'

    # Rubeus relay
    selection_rubeus_relay:
        CommandLine|contains:
            - 'Rubeus'
            - 'monitor /interval'
            - 'tgtdeleg'

    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing
    - Security assessment tools during approved audits
level: critical
