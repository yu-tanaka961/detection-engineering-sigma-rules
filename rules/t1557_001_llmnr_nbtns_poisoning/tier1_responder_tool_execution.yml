title: LLMNR/NBT-NS Poisoning Tool Execution
id: f7c3d9a1-3101-4de0-b8c7-unified-t1557001
related:
    - id: a1b2c3d4-5e6f-unified-t1557001tool  # SigmaHQ Responder
      type: derived
status: test
description: |
    Detects execution of known LLMNR/NBT-NS/mDNS poisoning tools such as
    Responder, Inveigh, and related utilities. These tools poison name
    resolution requests to intercept authentication traffic and capture
    NTLMv1/v2 hashes for offline cracking.
    Unified from:
    - SigmaHQ proc_creation_win_responder.yml
    - Elastic credential_access_llmnr_poisoning.toml
    - Splunk ESCU (LLMNR/NBT-NS Poisoning)
    - Azure Sentinel (Name Resolution Poisoning)
references:
    - https://attack.mitre.org/techniques/T1557/001/
    - https://github.com/lgandx/Responder
    - https://github.com/Kevin-Robertson/Inveigh
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.collection
    - attack.t1557.001
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # Responder tool
    selection_responder:
        CommandLine|contains:
            - 'Responder.py'
            - 'Responder.exe'
            - '-I eth'
            - '-wrFd'
            - 'MultiRelay'

    # Inveigh PowerShell
    selection_inveigh:
        CommandLine|contains:
            - 'Invoke-Inveigh'
            - 'Inveigh'
            - 'InveighRelay'
            - 'Invoke-InveighRelay'

    # Inveigh .NET
    selection_inveigh_exe:
        Image|endswith:
            - '\Inveigh.exe'
            - '\InveighZero.exe'

    # Pretender (Go-based)
    selection_pretender:
        CommandLine|contains:
            - 'pretender'
            - '-spoof'
            - '--spoof'
        CommandLine|contains:
            - 'llmnr'
            - 'nbtns'
            - 'mdns'
            - 'dhcp6'

    # Generic poisoning indicators
    selection_generic:
        CommandLine|contains:
            - 'NBTNSPoisoner'
            - 'LLMNRPoisoner'
            - 'MDNSPoisoner'

    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing
    - Network security assessment tools
level: critical
