title: Certutil Decode and Deobfuscation Operations
id: f7c3d9a1-2301-4de0-b8c7-unified-t1140
related:
    - id: d4e5f6a7-b8c9-0d1e-2f3a-unified-t1140cert  # SigmaHQ certutil
      type: derived
status: test
description: |
    Detects certutil.exe being used for file decoding, downloading, and
    deobfuscation operations. Certutil is a legitimate Windows certificate
    utility that adversaries abuse to decode Base64-encoded payloads,
    download files from remote URLs, and decode hex-encoded content.
    These operations are frequently part of multi-stage malware delivery.
    Unified from:
    - SigmaHQ proc_creation_win_certutil_decode.yml
    - Elastic defense_evasion_certutil_decode.toml
    - Splunk ESCU (Certutil Decode File)
    - Azure Sentinel (Certutil Suspicious Activity)
references:
    - https://attack.mitre.org/techniques/T1140/
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.defense_evasion
    - attack.t1140
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    selection_certutil:
        - Image|endswith: '\certutil.exe'
        - OriginalFileName: 'CertUtil.exe'

    # Base64 decode
    selection_decode:
        CommandLine|contains:
            - '-decode'
            - '/decode'
            - '-decodehex'
            - '/decodehex'

    # Base64 encode (used to create encoded payloads)
    selection_encode:
        CommandLine|contains:
            - '-encode'
            - '/encode'
            - '-encodehex'
            - '/encodehex'

    # URL download cache
    selection_urlcache:
        CommandLine|contains:
            - '-urlcache'
            - '/urlcache'
            - '-verifyctl'
            - '/verifyctl'

    # Split flag (bypass download detection)
    selection_split:
        CommandLine|contains:
            - '-split'
            - '/split'
            - '-f '
            - '/f '

    # Output to suspicious paths
    selection_susp_output:
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\Downloads\'
            - '\ProgramData\'

    condition: selection_certutil and (selection_decode or selection_encode or selection_urlcache) and (selection_split or selection_susp_output)
falsepositives:
    - Legitimate certificate management operations
    - PKI administrators using certutil for certificate handling
level: high
