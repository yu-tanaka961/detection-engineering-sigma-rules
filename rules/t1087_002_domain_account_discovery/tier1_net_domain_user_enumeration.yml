title: Domain Account Enumeration via Net/WMIC Commands
id: f7c3d9a1-1087-4de0-b8c7-unified-t1087001
related:
  - id: sigmahq-net-user-domain
    type: derived
  - id: elastic-domain-account-enum
    type: derived
status: experimental
description: |
  Detects domain account enumeration via net user /domain, net group, wmic useraccount,
  and similar built-in Windows commands. Attackers enumerate domain accounts to identify
  high-privilege targets for credential theft or lateral movement.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1087/002/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1087.002
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_net_user:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - ' user '
      - ' group '
      - ' localgroup '
    CommandLine|contains:
      - '/domain'
      - '/do'
  selection_net_group_specific:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - '"Domain Admins"'
      - '"Domain Users"'
      - '"Enterprise Admins"'
      - '"Schema Admins"'
      - '"Account Operators"'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'useraccount'
      - 'group'
    CommandLine|contains:
      - 'domain'
      - 'list'
      - 'get'
  condition: selection_net_user or selection_net_group_specific or selection_wmic
falsepositives:
  - Legitimate AD administration
  - IT helpdesk scripts querying user accounts
level: medium
