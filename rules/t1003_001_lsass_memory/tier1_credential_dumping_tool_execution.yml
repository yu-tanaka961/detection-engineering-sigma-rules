title: Credential Dumping Tool Execution Targeting LSASS
id: f7c3d9a1-2502-4de0-b8c7-unified-t1003001
related:
    - id: b2c3d4e5-6f7a-8b9c-0d1e-unified-lsass-tool  # SigmaHQ cred dump tool
      type: derived
status: test
description: |
    Detects execution of known credential dumping tools that target LSASS
    memory. Covers Mimikatz, ProcDump, comsvcs.dll MiniDump, Task Manager
    dump, and other tools used to extract credentials from LSASS process
    memory.
    Unified from:
    - SigmaHQ proc_creation_win_mimikatz.yml, proc_creation_win_procdump_lsass.yml
    - Elastic credential_access_mimikatz.toml, credential_access_lsass_dump.toml
    - Splunk ESCU (Credential Dumping Tools)
    - Azure Sentinel (LSASS Credential Dump)
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/gentilkiwi/mimikatz
    - https://lolbas-project.github.io/lolbas/OtherMSBinaries/Procdump/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1003.001
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # Mimikatz execution
    selection_mimikatz:
        CommandLine|contains:
            - 'sekurlsa::'
            - 'sekurlsa::logonpasswords'
            - 'sekurlsa::wdigest'
            - 'sekurlsa::minidump'
            - 'lsadump::'
            - 'kerberos::list'
            - 'privilege::debug'

    # Mimikatz binary indicators
    selection_mimikatz_binary:
        Image|endswith:
            - '\mimikatz.exe'
            - '\mimilib.dll'
        CommandLine|contains:
            - 'mimikatz'

    # ProcDump targeting LSASS
    selection_procdump:
        Image|endswith:
            - '\procdump.exe'
            - '\procdump64.exe'
        CommandLine|contains:
            - 'lsass'

    # comsvcs.dll MiniDump
    selection_comsvcs:
        CommandLine|contains:
            - 'comsvcs.dll'
            - 'MiniDump'
        CommandLine|contains:
            - 'rundll32'
            - '#24'
            - 'full'

    # createdump.exe (.NET dump tool)
    selection_createdump:
        Image|endswith: '\createdump.exe'
        CommandLine|contains: 'lsass'

    # Pypykatz / nanodump / handlekatz
    selection_other_tools:
        CommandLine|contains:
            - 'pypykatz'
            - 'nanodump'
            - 'handlekatz'
            - 'dumpert'
            - 'SafetyKatz'
            - 'SharpKatz'
            - 'BetterSafetyKatz'

    # PowerShell LSASS dump
    selection_ps_dump:
        CommandLine|contains:
            - 'Out-Minidump'
            - 'Get-Process lsass'
            - 'Invoke-Mimikatz'
            - '[System.Diagnostics.Process]::GetProcessesByName(''lsass'')'

    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing
    - Legitimate process debugging by developers
level: critical
