title: Active Directory Computer Enumeration via PowerShell/LDAP
id: f7c3d9a1-1018-4de0-b8c7-unified-t1018002
related:
  - id: sigmahq-ad-computer-enum
    type: derived
  - id: elastic-ad-discovery
    type: derived
status: experimental
description: |
  Detects Active Directory computer object enumeration via PowerShell AD cmdlets,
  LDAP queries, and tools like PowerView/ADFind. This is commonly used during
  reconnaissance to map the network and identify high-value targets.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1018/
  - https://github.com/PowerShellMafia/PowerSploit
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1018
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell_ad:
    CommandLine|contains:
      - 'Get-ADComputer'
      - 'Get-DomainComputer'
      - 'Get-NetComputer'
  selection_adfind:
    Image|endswith: '\AdFind.exe'
    CommandLine|contains:
      - '-f'
      - 'objectcategory=computer'
      - 'objectclass=computer'
  selection_adfind_generic:
    CommandLine|contains:
      - 'adfind'
      - 'AdFind'
    CommandLine|contains:
      - 'computer'
      - 'subnet'
      - 'domainlist'
  selection_ldapsearch:
    CommandLine|contains:
      - 'ldapsearch'
      - '(objectClass=computer)'
      - '(objectCategory=computer)'
  condition: selection_powershell_ad or selection_adfind or selection_adfind_generic or selection_ldapsearch
falsepositives:
  - Legitimate AD administration scripts
  - IT asset inventory tools
level: medium
