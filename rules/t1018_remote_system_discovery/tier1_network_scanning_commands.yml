title: Remote System Discovery via Network Scanning Commands
id: f7c3d9a1-1018-4de0-b8c7-unified-t1018001
related:
  - id: sigmahq-net-discovery
    type: derived
  - id: elastic-remote-system-discovery
    type: derived
status: experimental
description: |
  Detects remote system discovery via built-in Windows commands such as
  net view, nltest, dsquery, ping sweep, and arp enumeration. Attackers use
  these to identify lateral movement targets within the network.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1018/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1018
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_net_view:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - ' view'
      - ' group "Domain Computers"'
  selection_nltest:
    Image|endswith: '\nltest.exe'
    CommandLine|contains:
      - '/dclist:'
      - '/dsgetdc:'
      - '/server:'
  selection_dsquery:
    Image|endswith: '\dsquery.exe'
    CommandLine|contains:
      - 'computer'
      - 'server'
      - 'subnet'
  selection_arp:
    Image|endswith: '\arp.exe'
    CommandLine|contains:
      - '-a'
      - '/a'
  selection_ping_sweep:
    Image|endswith: '\ping.exe'
    CommandLine|contains:
      - '-n 1'
      - '/n 1'
  condition: selection_net_view or selection_nltest or selection_dsquery or selection_arp or selection_ping_sweep
falsepositives:
  - Legitimate network administration and troubleshooting
  - IT inventory scripts
level: medium
