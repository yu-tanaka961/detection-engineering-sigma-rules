title: Network Scanner Tool Execution for Remote System Discovery
id: f7c3d9a1-1018-4de0-b8c7-unified-t1018003
related:
  - id: sigmahq-network-scanner
    type: derived
  - id: splunk-network-scan-tools
    type: derived
status: experimental
description: |
  Detects execution of network scanning tools such as nmap, masscan, Advanced IP
  Scanner, Angry IP Scanner, and SoftPerfect Network Scanner used for remote
  system discovery. These tools are commonly used by attackers during
  post-compromise reconnaissance.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1018/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1018
  - x-source.sigmahq
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_nmap:
    Image|endswith:
      - '\nmap.exe'
      - '\masscan.exe'
    CommandLine|contains:
      - '-sn'
      - '-sP'
      - '-sS'
      - '-sT'
      - '-sV'
      - '-p '
      - '--top-ports'
  selection_scanners:
    Image|endswith:
      - '\advanced_ip_scanner.exe'
      - '\ipscan.exe'
      - '\netscan.exe'
      - '\nbtscan.exe'
      - '\SoftPerfectNetworkScanner.exe'
  selection_scanner_names:
    OriginalFileName|contains:
      - 'nmap'
      - 'masscan'
      - 'Advanced IP Scanner'
      - 'Angry IP Scanner'
  condition: selection_nmap or selection_scanners or selection_scanner_names
falsepositives:
  - Legitimate network administration and vulnerability scanning
  - IT security teams performing authorized scans
level: high
