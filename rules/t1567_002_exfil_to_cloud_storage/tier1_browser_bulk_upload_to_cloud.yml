title: Suspicious Web Upload to Cloud Storage via PowerShell
id: f7c3d9a1-1567-4de0-b8c7-unified-t1567002a02
status: experimental
description: |
  Detects PowerShell or curl-based HTTP uploads to known cloud storage endpoints
  (S3, Azure Blob, OneDrive, Google Drive, Dropbox, Mega) for data exfiltration.
  Unified detection logic from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel.
references:
  - https://attack.mitre.org/techniques/T1567/002/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.exfiltration
  - attack.t1567.002
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.azure-sentinel
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_tool:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\curl.exe'
  selection_upload_endpoints:
    CommandLine|contains:
      - '.s3.amazonaws.com'
      - '.blob.core.windows.net'
      - 'drive.google.com'
      - 'upload.google.com'
      - 'api.onedrive.com'
      - 'graph.microsoft.com'
      - 'content.dropboxapi.com'
      - 'api.dropboxapi.com'
      - 'g.api.mega.co.nz'
      - 'transfer.sh'
      - 'file.io'
      - 'temp.sh'
      - 'gofile.io'
      - 'anonfiles.com'
  condition: selection_tool and selection_upload_endpoints
falsepositives:
  - Legitimate cloud file sync applications
  - Authorized backup scripts
level: high
x-log-requirement:
  source: Sysmon EventID 1 / Security 4688
  requirement: Process command line logging enabled
