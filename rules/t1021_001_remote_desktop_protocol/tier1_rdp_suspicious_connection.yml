title: Suspicious RDP Connection Indicators
id: f7c3d9a1-1021-4de0-b8c7-unified-t1021101
related:
  - id: sigmahq-rdp-connection
    type: derived
  - id: elastic-rdp-lateral-movement
    type: derived
status: experimental
description: |
  Detects suspicious RDP lateral movement via mstsc.exe execution with remote
  targets, RDP session events, and RDP port redirection. Attackers use RDP
  for interactive lateral movement within compromised networks.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1021/001/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.lateral_movement
  - attack.t1021.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_mstsc:
    Image|endswith: '\mstsc.exe'
    CommandLine|contains:
      - '/v:'
  selection_mstsc_shadow:
    Image|endswith: '\mstsc.exe'
    CommandLine|contains:
      - '/shadow:'
      - '/control'
  selection_rdp_tools:
    CommandLine|contains:
      - 'SharpRDP'
      - 'sharprdp'
      - 'xfreerdp'
      - 'rdesktop'
  selection_rdp_tunnel:
    CommandLine|contains:
      - 'portfwd'
      - 'netsh interface portproxy'
      - 'ssh -L'
      - 'ssh -R'
      - 'chisel'
      - 'plink'
    CommandLine|contains:
      - '3389'
  condition: selection_mstsc or selection_mstsc_shadow or selection_rdp_tools or selection_rdp_tunnel
falsepositives:
  - Legitimate remote administration via RDP
  - IT helpdesk connecting to user workstations
level: medium
