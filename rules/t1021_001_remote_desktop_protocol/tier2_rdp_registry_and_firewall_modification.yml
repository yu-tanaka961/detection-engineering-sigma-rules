title: RDP Enable via Registry/Firewall Modification
id: f7c3d9a1-1021-4de0-b8c7-unified-t1021103
related:
  - id: elastic-rdp-enable-registry
    type: derived
  - id: splunk-rdp-firewall-mod
    type: derived
status: experimental
description: |
  Detects enabling of RDP via registry modification (fDenyTSConnections),
  firewall rule changes, and NLA (Network Level Authentication) disabling.
  Attackers enable RDP on compromised hosts to establish persistent lateral
  movement capability.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://attack.mitre.org/techniques/T1112/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.lateral_movement
  - attack.defense_evasion
  - attack.t1021.001
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-source.azure-sentinel
  - x-evasion-resistance.high
  - x-drs.dq-coverage
  - x-drs.ed-log-evasion-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_reg_rdp_enable:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'fDenyTSConnections'
    CommandLine|contains:
      - '/d 0'
      - 'REG_DWORD /d 0'
  selection_reg_nla_disable:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'UserAuthentication'
      - 'SecurityLayer'
    CommandLine|contains:
      - '/d 0'
  selection_firewall_rdp:
    Image|endswith: '\netsh.exe'
    CommandLine|contains:
      - 'firewall'
      - 'advfirewall'
    CommandLine|contains:
      - '3389'
      - 'Remote Desktop'
      - 'allow'
      - 'enable'
  selection_powershell_rdp:
    CommandLine|contains:
      - 'Set-ItemProperty'
      - 'New-ItemProperty'
    CommandLine|contains:
      - 'fDenyTSConnections'
      - 'Terminal Server'
  condition: selection_reg_rdp_enable or selection_reg_nla_disable or selection_firewall_rdp or selection_powershell_rdp
falsepositives:
  - Legitimate RDP configuration by system administrators
  - Group Policy enforcing RDP settings
level: high
