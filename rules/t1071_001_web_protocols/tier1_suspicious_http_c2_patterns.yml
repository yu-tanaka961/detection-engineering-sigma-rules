title: Suspicious HTTP/HTTPS C2 Communication Patterns
id: f7c3d9a1-1071-4de0-b8c7-unified-t1071001
related:
  - id: sigmahq-http-c2-patterns
    type: derived
  - id: elastic-web-c2-traffic
    type: derived
status: experimental
description: |
  Detects suspicious HTTP/HTTPS communication patterns indicative of C2 channels,
  including connections from LOLBins (certutil, bitsadmin, mshta) to external
  hosts, and PowerShell web requests to suspicious endpoints.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1071/001/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.command_and_control
  - attack.t1071.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_certutil_download:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '-verifyctl'
      - '/urlcache'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  selection_powershell_web:
    CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'wget '
      - 'curl '
      - 'iwr '
      - 'irm '
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
      - 'DownloadData'
  selection_bitsadmin_download:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  selection_mshta_url:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  condition: selection_certutil_download or selection_powershell_web or selection_bitsadmin_download or selection_mshta_url
falsepositives:
  - Legitimate file downloads by administrators
  - Software update mechanisms
level: medium
