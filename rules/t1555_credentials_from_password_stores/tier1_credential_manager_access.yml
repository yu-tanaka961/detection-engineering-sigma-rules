title: Windows Credential Manager or Vault Access
id: f7c3d9a1-2702-4de0-b8c7-unified-t1555
related:
    - id: b2c3d4e5-6f7a-8b9c-0d1e-unified-t1555vault  # Elastic credential vault
      type: derived
status: test
description: |
    Detects suspicious access to Windows Credential Manager (vaultcmd.exe),
    credential vault files, and DPAPI master keys. Windows Credential
    Manager stores web and network credentials that can be extracted by
    adversaries using tools like Mimikatz dpapi module or vaultcmd.
    Unified from:
    - Elastic credential_access_credential_vault.toml
    - SigmaHQ proc_creation_win_vaultcmd.yml
    - Splunk ESCU (Credential Vault Access)
    - Azure Sentinel (Windows Credential Manager Access)
references:
    - https://attack.mitre.org/techniques/T1555/004/
    - https://attack.mitre.org/techniques/T1555/
author: Yuhei Tanaka (Unified from Elastic, SigmaHQ, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1555.004
    - x-source.elastic-detection-rules
    - x-source.sigmahq
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # vaultcmd.exe credential enumeration
    selection_vaultcmd:
        Image|endswith: '\vaultcmd.exe'
        CommandLine|contains:
            - '/list'
            - '/listcreds'
            - '/listproperties'

    # cmdkey credential listing
    selection_cmdkey:
        Image|endswith: '\cmdkey.exe'
        CommandLine|contains:
            - '/list'

    # Mimikatz DPAPI module
    selection_dpapi_mimikatz:
        CommandLine|contains:
            - 'dpapi::'
            - 'vault::list'
            - 'vault::cred'
            - 'sekurlsa::credman'

    # DPAPI master key file access via suspicious process
    selection_dpapi_tools:
        CommandLine|contains:
            - 'Invoke-SharpDPAPI'
            - 'SharpDPAPI'
            - 'SharpChrome'
            - 'DonPAPI'
            - 'LaZagne'

    # PowerShell credential vault access
    selection_ps_vault:
        CommandLine|contains:
            - '[Windows.Security.Credentials.PasswordVault'
            - 'PasswordVault'
            - 'Get-VaultCredential'
            - 'Get-StoredCredential'

    condition: 1 of selection_*
falsepositives:
    - Legitimate credential management by IT administrators
    - Password manager applications
level: high
