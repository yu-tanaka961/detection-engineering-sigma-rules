title: DPAPI Master Key File Access by Suspicious Process
id: f7c3d9a1-2703-4de0-b8c7-unified-t1555
related:
    - id: c3d4e5f6-7a8b-9c0d-1e2f-unified-t1555dpapi  # Elastic DPAPI access
      type: derived
status: test
description: |
    Detects suspicious processes accessing DPAPI (Data Protection API)
    master key files stored in %APPDATA%\Microsoft\Protect\. DPAPI master
    keys are used to decrypt saved credentials, browser passwords, and
    other protected data. Access by non-standard processes indicates
    credential theft activity.
    Unified from:
    - Elastic credential_access_dpapi_masterkey.toml
    - SigmaHQ file_access_win_dpapi_masterkey.yml
    - Splunk ESCU (DPAPI Master Key Access)
references:
    - https://attack.mitre.org/techniques/T1555/
    - https://www.ired.team/offensive-security/credential-access-and-credential-dumping/reading-dpapi-encrypted-secrets-with-mimikatz-and-c++
author: Yuhei Tanaka (Unified from Elastic, SigmaHQ, Splunk)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1555
    - x-source.elastic-detection-rules
    - x-source.sigmahq
    - x-source.splunk-escu
    - x-evasion-resistance.high
    - x-drs.ed-log-evasion-resistance
    - x-log-requirement.sysmon-fileaccess
logsource:
    category: file_access
    product: windows
detection:
    selection_masterkey:
        TargetFilename|contains: '\Microsoft\Protect\'

    selection_credential_files:
        TargetFilename|contains:
            - '\Microsoft\Credentials\'
            - '\Microsoft\Vault\'

    filter_system:
        Image|endswith:
            - '\lsass.exe'
            - '\svchost.exe'
            - '\explorer.exe'
            - '\SearchProtocolHost.exe'

    filter_programs:
        Image|startswith:
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
            - 'C:\Windows\System32\'

    condition: (selection_masterkey or selection_credential_files) and not 1 of filter_*
falsepositives:
    - Credential backup tools
    - User profile migration
level: high
