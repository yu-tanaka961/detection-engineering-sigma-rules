title: Browser Credential Store Access
id: f7c3d9a1-2701-4de0-b8c7-unified-t1555
related:
    - id: a1b2c3d4-5e6f-7a8b-9c0d-unified-t1555brw  # SigmaHQ browser cred
      type: derived
status: test
description: |
    Detects suspicious processes accessing browser credential stores
    (Login Data, logins.json, cookies databases). Adversaries target
    Chrome, Firefox, Edge, and other Chromium-based browsers to extract
    saved passwords, cookies, and session tokens.
    Unified from:
    - SigmaHQ file_access_win_browser_credential_access.yml
    - Elastic credential_access_browser_credentials.toml
    - Splunk ESCU (Browser Credential Access)
    - Azure Sentinel (Browser Credential Theft)
references:
    - https://attack.mitre.org/techniques/T1555/003/
    - https://attack.mitre.org/techniques/T1555/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1555.003
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: file_access
    product: windows
detection:
    # Chrome/Edge credential files
    selection_chromium:
        TargetFilename|contains:
            - '\User Data\Default\Login Data'
            - '\User Data\Default\Cookies'
            - '\User Data\Default\Web Data'
            - '\User Data\Default\Local State'
            - '\User Data\Default\Network\Cookies'

    # Firefox credential files
    selection_firefox:
        TargetFilename|contains:
            - '\logins.json'
            - '\key4.db'
            - '\key3.db'
            - '\cert9.db'
            - '\cookies.sqlite'
            - '\signons.sqlite'

    # Filter: legitimate browser processes
    filter_browsers:
        Image|endswith:
            - '\chrome.exe'
            - '\msedge.exe'
            - '\firefox.exe'
            - '\brave.exe'
            - '\opera.exe'
            - '\vivaldi.exe'
            - '\iexplore.exe'

    filter_system:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Program Files\Google\'
            - 'C:\Program Files\Mozilla Firefox\'
            - 'C:\Program Files (x86)\Microsoft\Edge\'
            - 'C:\Program Files\Microsoft\Edge\'
            - 'C:\Program Files\BraveSoftware\'

    condition: (selection_chromium or selection_firefox) and not 1 of filter_*
falsepositives:
    - Password manager applications syncing browser credentials
    - Backup software accessing browser profiles
    - Browser migration tools
level: high
