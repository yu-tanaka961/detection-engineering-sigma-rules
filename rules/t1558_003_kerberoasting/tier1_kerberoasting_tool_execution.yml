title: Kerberoasting Tool Execution
id: f7c3d9a1-2602-4de0-b8c7-unified-t1558003
related:
    - id: e5f6a7b8-9c0d-1e2f-3a4b-unified-kerb-tool  # Elastic Kerberoast tool
      type: derived
status: test
description: |
    Detects execution of known Kerberoasting tools and PowerShell commands
    used to request service tickets for offline cracking. Covers Rubeus
    kerberoast, Invoke-Kerberoast, GetUserSPNs, and other tools that
    enumerate SPNs and request TGS tickets.
    Unified from:
    - Elastic credential_access_kerberoasting_tools.toml
    - SigmaHQ proc_creation_win_kerberoast_tools.yml
    - Splunk ESCU (Kerberoasting Tool Execution)
    - Azure Sentinel (Kerberoasting Tool Detection)
references:
    - https://attack.mitre.org/techniques/T1558/003/
    - https://github.com/GhostPack/Rubeus
    - https://github.com/nidem/kerberoast
author: Yuhei Tanaka (Unified from Elastic, SigmaHQ, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1558.003
    - x-source.elastic-detection-rules
    - x-source.sigmahq
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # Rubeus kerberoast
    selection_rubeus:
        CommandLine|contains:
            - 'Rubeus'
            - 'kerberoast'
            - 'asreproast'
            - '/spn:'
            - '/tgtdeleg'

    # Invoke-Kerberoast PowerShell
    selection_ps_kerberoast:
        CommandLine|contains:
            - 'Invoke-Kerberoast'
            - 'Request-SPNTicket'
            - 'Get-DomainSPNTicket'

    # Impacket GetUserSPNs
    selection_impacket:
        CommandLine|contains:
            - 'GetUserSPNs'
            - 'getuserspns'
            - '-request'
            - 'outputfile'

    # setspn.exe enumeration
    selection_setspn:
        Image|endswith: '\setspn.exe'
        CommandLine|contains:
            - '-Q */*'
            - '-T '
            - '-F -Q'

    # PowerShell SPN enumeration
    selection_ps_spn:
        CommandLine|contains:
            - 'Get-ADUser'
            - 'Get-DomainUser'
        CommandLine|contains:
            - 'ServicePrincipalName'
            - 'serviceprincipalname'
            - 'SPN'

    # .NET Kerberos ticket request
    selection_dotnet_kerberos:
        CommandLine|contains:
            - 'KerberosRequestorSecurityToken'
            - 'System.IdentityModel.Tokens.KerberosRequestorSecurityToken'

    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing
    - SPN enumeration by legitimate IT administration tools
level: high
