title: Remote Access Tool Execution (AnyDesk/TeamViewer/ScreenConnect)
id: f7c3d9a1-1219-4de0-b8c7-unified-t1219001
related:
  - id: sigmahq-remote-access-tool
    type: derived
  - id: elastic-rat-execution
    type: derived
status: experimental
description: |
  Detects execution of commercial remote access tools commonly abused by
  attackers for persistence and C2, including AnyDesk, TeamViewer,
  ScreenConnect (ConnectWise), LogMeIn, Splashtop, and Atera.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1219/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.command_and_control
  - attack.t1219
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_anydesk:
    Image|endswith: '\AnyDesk.exe'
    CommandLine|contains:
      - '--install'
      - '--start-with-win'
      - '--silent'
      - '--set-password'
  selection_teamviewer:
    Image|endswith: '\TeamViewer.exe'
    CommandLine|contains:
      - '--daemon'
      - 'assignment'
  selection_screenconnect:
    Image|endswith:
      - '\ScreenConnect.ClientService.exe'
      - '\ScreenConnect.WindowsClient.exe'
    CommandLine|contains:
      - 'RunRole'
      - 'e='
      - 'y='
  selection_other_rat:
    Image|endswith:
      - '\LogMeIn.exe'
      - '\SplashTop'
      - '\AteraAgent.exe'
      - '\RustDesk.exe'
      - '\ngrok.exe'
  selection_suspicious_install:
    CommandLine|contains:
      - 'anydesk'
      - 'teamviewer'
      - 'screenconnect'
      - 'connectwise'
    CommandLine|contains:
      - '/S'
      - '/silent'
      - '-silent'
      - 'msiexec'
  condition: selection_anydesk or selection_teamviewer or selection_screenconnect or selection_other_rat or selection_suspicious_install
falsepositives:
  - Legitimate IT support using remote access tools
  - Company-approved remote access solutions
level: medium
