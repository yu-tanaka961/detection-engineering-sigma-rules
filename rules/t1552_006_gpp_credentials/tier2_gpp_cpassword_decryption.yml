title: GPP cpassword Decryption Activity in ScriptBlock
id: f7c3d9a1-3203-4de0-b8c7-unified-t1552006
related:
    - id: f6a7b8c9-0d1e-unified-t1552006decrypt  # SigmaHQ GPP decrypt
      type: derived
status: test
description: |
    Detects PowerShell ScriptBlock content related to GPP cpassword
    decryption. The AES-256 key used by GPP is publicly known
    (MS14-025), and scripts commonly use CryptoServiceProvider with
    the known key to decrypt cpassword values from GPP XML files.
    ScriptBlock Logging captures the full decryption logic.
    Unified from:
    - SigmaHQ posh_ps_gpp_decrypt.yml
    - Elastic credential_access_gpp_decrypt_scriptblock.toml
    - Splunk ESCU (GPP Decryption in ScriptBlock)
references:
    - https://attack.mitre.org/techniques/T1552/006/
    - https://learn.microsoft.com/en-us/security-updates/securitybulletins/2014/ms14-025
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1552.006
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-evasion-resistance.high
    - x-drs.ed-log-evasion-resistance
    - x-log-requirement.powershell-scriptblock-4104
logsource:
    product: windows
    category: ps_script
    definition: 'PowerShell ScriptBlock Logging (EventID 4104) must be enabled'
detection:
    # Known GPP AES key bytes
    selection_aes_key:
        ScriptBlockText|contains:
            - '4e9906e8fcb66cc9faf49310620ffee8f496e806cc057990209b09a433b66c1b'
            - 'AesObject'
            - 'CryptoServiceProvider'
        ScriptBlockText|contains:
            - 'cpassword'
            - 'Groups.xml'

    # Get-GPPPassword function
    selection_gpp_function:
        ScriptBlockText|contains:
            - 'Get-GPPPassword'
            - 'Get-CachedGPPPassword'
            - 'Get-DecryptedCpassword'

    # Generic GPP decrypt pattern
    selection_generic_decrypt:
        ScriptBlockText|contains:
            - 'cpassword'
            - 'ConvertTo-SecureString'
        ScriptBlockText|contains:
            - 'SYSVOL'
            - 'Policies'
            - 'Groups.xml'

    condition: 1 of selection_*
falsepositives:
    - Security auditing scripts checking for GPP password exposure
level: critical
