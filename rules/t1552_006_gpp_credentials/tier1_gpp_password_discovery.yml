title: Group Policy Preferences Password Discovery
id: f7c3d9a1-3201-4de0-b8c7-unified-t1552006
related:
    - id: d4e5f6a7-8b9c-unified-t1552006gpp  # SigmaHQ GPP password
      type: derived
status: test
description: |
    Detects attempts to find and extract passwords from Group Policy
    Preferences (GPP) XML files. GPP allowed administrators to set local
    passwords which were stored as AES-encrypted cpassword values in
    SYSVOL. Microsoft published the AES key (MS14-025), making these
    passwords trivially decryptable. Tools like Get-GPPPassword and
    gpp-decrypt target these files.
    Unified from:
    - SigmaHQ proc_creation_win_gpp_password.yml
    - Elastic credential_access_gpp_password.toml
    - Splunk ESCU (GPP Password Discovery)
    - Azure Sentinel (GPP Credential Access)
references:
    - https://attack.mitre.org/techniques/T1552/006/
    - https://learn.microsoft.com/en-us/security-updates/securitybulletins/2014/ms14-025
    - https://adsecurity.org/?p=2288
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1552.006
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # Get-GPPPassword PowerShell module
    selection_ps_gpp:
        CommandLine|contains:
            - 'Get-GPPPassword'
            - 'Get-CachedGPPPassword'
            - 'Get-GPPAutologon'
            - 'Invoke-GPPPassword'

    # gpp-decrypt tool
    selection_gpp_decrypt:
        CommandLine|contains:
            - 'gpp-decrypt'
            - 'gppdecrypt'

    # Direct access to GPP XML files
    selection_gpp_files:
        CommandLine|contains:
            - '\Policies\'
            - 'SYSVOL'
            - 'sysvol'
        CommandLine|contains:
            - 'Groups.xml'
            - 'Services.xml'
            - 'Scheduledtasks.xml'
            - 'DataSources.xml'
            - 'Printers.xml'
            - 'Drives.xml'

    # Search for cpassword
    selection_cpassword:
        CommandLine|contains:
            - 'cpassword'
            - 'cPassword'

    # findstr/Select-String for GPP passwords
    selection_search_gpp:
        CommandLine|contains:
            - 'findstr'
            - 'Select-String'
        CommandLine|contains:
            - 'cpassword'
            - 'Groups.xml'
            - 'userName'

    condition: 1 of selection_*
falsepositives:
    - Security auditing tools scanning for GPP password exposure
    - Compliance verification
level: high
