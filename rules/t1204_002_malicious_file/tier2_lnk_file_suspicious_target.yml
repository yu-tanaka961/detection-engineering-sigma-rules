title: LNK File with Suspicious Target Command
id: f7c3d9a1-0803-4de0-b8c7-unified-t1204002
related:
    - id: 8d7e9f1c-3a5b-4c2d-8e6f-7a1b2c3d4e5f  # SigmaHQ suspicious LNK
      type: derived
status: test
description: |
    Detects execution of Windows Shortcut (.lnk) files that target suspicious
    commands such as PowerShell, cmd.exe, mshta, or other LOLBins.
    Weaponized LNK files are a major delivery mechanism for malware,
    especially after the macro lockdown. The .lnk format allows hiding
    the actual command behind an innocuous icon.
    Unified from:
    - SigmaHQ proc_creation_win_lnk_susp_target.yml
    - Elastic execution_suspicious_lnk_target.toml
    - Splunk ESCU (Malicious LNK File Execution)
references:
    - https://attack.mitre.org/techniques/T1204/002/
    - https://attack.mitre.org/techniques/T1547/009/
    - https://www.trendmicro.com/en_us/research/22/j/tracking-earth-berberoka.html
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk)
date: 2026/06/28
tags:
    - attack.execution
    - attack.t1204.002
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # Explorer as parent (user double-clicked the LNK)
    selection_parent:
        ParentImage|endswith: '\explorer.exe'

    # Suspicious target processes
    selection_child_shell:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\bash.exe'

    selection_child_lolbin:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\msiexec.exe'
            - '\forfiles.exe'
            - '\pcalua.exe'
            - '\hh.exe'

    # Command line contains .lnk reference or suspicious arguments
    selection_cmdline_indicators:
        CommandLine|contains:
            - '.lnk'
            - '/c start'
            - 'http://'
            - 'https://'
            - '-encodedcommand'
            - '-enc '
            - 'IEX'
            - 'Invoke-'

    condition: selection_parent and (selection_child_shell or selection_child_lolbin) and selection_cmdline_indicators
falsepositives:
    - Legitimate application shortcuts with complex launch parameters
    - Corporate desktop shortcuts to intranet tools
level: high
