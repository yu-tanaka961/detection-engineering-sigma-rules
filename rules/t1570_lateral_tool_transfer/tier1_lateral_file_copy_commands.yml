title: Lateral Tool Transfer via File Copy Commands
id: f7c3d9a1-1570-4de0-b8c7-unified-t1570001
related:
  - id: sigmahq-lateral-file-copy
    type: derived
  - id: elastic-lateral-tool-transfer
    type: derived
status: experimental
description: |
  Detects lateral tool transfer via copy, xcopy, robocopy, and PowerShell
  Copy-Item to remote UNC paths. Attackers transfer tools, payloads, and
  scripts to remote systems prior to execution.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1570/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.lateral_movement
  - attack.t1570
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_copy_remote:
    Image|endswith:
      - '\cmd.exe'
      - '\xcopy.exe'
      - '\robocopy.exe'
    CommandLine|contains:
      - '\\\\'
    CommandLine|contains:
      - 'copy '
      - 'xcopy '
      - 'robocopy '
  selection_copy_exe_transfer:
    Image|endswith:
      - '\cmd.exe'
      - '\xcopy.exe'
      - '\robocopy.exe'
    CommandLine|contains:
      - '\\\\'
    CommandLine|contains:
      - '.exe'
      - '.dll'
      - '.bat'
      - '.ps1'
      - '.vbs'
  selection_powershell_copy:
    CommandLine|contains:
      - 'Copy-Item'
      - 'Move-Item'
    CommandLine|contains:
      - '\\\\'
    CommandLine|contains:
      - '.exe'
      - '.dll'
      - '.ps1'
  selection_bitsadmin_transfer:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - '/create'
    CommandLine|contains:
      - '\\\\'
  condition: selection_copy_remote or selection_copy_exe_transfer or selection_powershell_copy or selection_bitsadmin_transfer
falsepositives:
  - Legitimate software deployment
  - IT administration scripts copying tools
level: medium
