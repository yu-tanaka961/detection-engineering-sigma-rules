title: Service Creation via sc.exe with Suspicious Parameters
id: f7c3d9a1-0902-4de0-b8c7-unified-t1569002
related:
    - id: c02e96b0-a4b6-4d49-b404-8a519dd01c6e  # SigmaHQ sc.exe abuse
      type: derived
status: test
description: |
    Detects use of sc.exe to create or configure services with suspicious
    parameters. Adversaries use sc.exe to install backdoor services,
    change service binaries, or set services to auto-start for persistence.
    Unified from:
    - SigmaHQ proc_creation_win_sc_service_creation.yml
    - Elastic persistence_sc_service_creation.toml
    - Splunk ESCU (SC.exe Service Creation)
references:
    - https://attack.mitre.org/techniques/T1569/002/
    - https://attack.mitre.org/techniques/T1543/003/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk)
date: 2026/06/28
tags:
    - attack.execution
    - attack.persistence
    - attack.t1569.002
    - attack.t1543.003
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\sc.exe'
        - OriginalFileName: 'sc.exe'

    # Service creation
    selection_create:
        CommandLine|contains|all:
            - 'create'
            - 'binPath'

    # Suspicious binpath values
    selection_binpath_suspicious:
        CommandLine|contains:
            - 'cmd.exe'
            - 'cmd /c'
            - 'powershell'
            - 'pwsh'
            - 'mshta'
            - 'rundll32'
            - 'regsvr32'
            - '\Temp\'
            - '\tmp\'
            - '\AppData\'
            - 'http://'
            - 'https://'
            - '\\\\' # UNC path

    # Service configuration change (binpath modification)
    selection_config:
        CommandLine|contains|all:
            - 'config'
            - 'binPath'

    # Service start type modification to auto
    selection_autostart:
        CommandLine|contains|all:
            - 'config'
            - 'start= auto'

    condition: selection_img and ((selection_create and selection_binpath_suspicious) or (selection_config and selection_binpath_suspicious) or selection_autostart)
falsepositives:
    - Legitimate service installations by system administrators
    - Software deployment tools creating services
    - Configuration management (SCCM, Chef, Puppet, Ansible)
level: high
