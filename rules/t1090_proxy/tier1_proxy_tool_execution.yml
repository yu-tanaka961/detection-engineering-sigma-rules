title: Proxy/SOCKS Tool Execution for Traffic Relay
id: f7c3d9a1-1090-4de0-b8c7-unified-t1090001
related:
  - id: sigmahq-proxy-tool
    type: derived
  - id: elastic-proxy-execution
    type: derived
status: experimental
description: |
  Detects execution of proxy and SOCKS tools used to relay traffic through
  compromised hosts, including netsh portproxy, ProxyChains, reGeorg,
  NeoReGeorg, and SOCKS proxy implementations.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1090/
  - https://attack.mitre.org/techniques/T1090/001/
  - https://attack.mitre.org/techniques/T1090/002/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.command_and_control
  - attack.t1090
  - attack.t1090.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_netsh_proxy:
    Image|endswith: '\netsh.exe'
    CommandLine|contains:
      - 'interface portproxy'
      - 'add v4tov4'
      - 'add v4tov6'
      - 'connectaddress='
      - 'listenport='
  selection_proxy_tools:
    CommandLine|contains:
      - 'proxychains'
      - 'reGeorg'
      - 'NeoReGeorg'
      - 'Neo-reGeorg'
      - 'tunna'
      - 'ABPTTS'
      - 'pivotnacci'
  selection_socks_proxy:
    CommandLine|contains:
      - 'socks4'
      - 'socks5'
      - '--socks'
      - '-socks'
      - 'SocksPort'
  selection_reverse_proxy:
    CommandLine|contains:
      - 'frpc'
      - 'frps'
      - 'nps '
      - 'npc '
      - 'rathole'
      - 'bore '
  condition: selection_netsh_proxy or selection_proxy_tools or selection_socks_proxy or selection_reverse_proxy
falsepositives:
  - Legitimate proxy configuration by administrators
  - Development tools
level: high
