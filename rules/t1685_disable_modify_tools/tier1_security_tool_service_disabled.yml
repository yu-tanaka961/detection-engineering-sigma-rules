title: Security Tool Service or Process Disabled
id: f7c3d9a1-2401-4de0-b8c7-unified-t1685
related:
    - id: a1b2c3d4-5e6f-7a8b-9c0d-unified-t1685svc  # SigmaHQ disable security
      type: derived
status: test
description: |
    Detects attempts to disable or stop security tool services and processes
    including Windows Defender, EDR agents, antivirus products, and Windows
    Firewall. Adversaries commonly disable security tools early in the
    attack chain to avoid detection. Covers sc.exe, net stop, Set-Service,
    taskkill, and registry-based disabling.
    Unified from:
    - SigmaHQ proc_creation_win_disable_defender.yml
    - Elastic defense_evasion_disable_security_tools.toml
    - Splunk ESCU (Disable Security Tools)
    - Azure Sentinel (Security Service Disabled)
references:
    - https://attack.mitre.org/techniques/T1685/
    - https://attack.mitre.org/techniques/T1562/001/
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.defense_evasion
    - attack.t1685
    - attack.t1562.001
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # sc.exe stop/disable security services
    selection_sc_stop:
        Image|endswith: '\sc.exe'
        CommandLine|contains:
            - ' stop '
            - ' delete '
            - ' config '
        CommandLine|contains:
            - 'WinDefend'
            - 'MpsSvc'
            - 'wscsvc'
            - 'SecurityHealthService'
            - 'Sense'
            - 'MBAMService'
            - 'SepMasterService'
            - 'SAVService'
            - 'McAfeeFramework'
            - 'McShield'
            - 'mfefire'
            - 'CrowdStrike'
            - 'CSFalcon'
            - 'CarbonBlack'
            - 'CbDefense'
            - 'SentinelOne'
            - 'SentinelAgent'
            - 'TrendMicro'
            - 'TMBMSRV'
            - 'Sophos'
            - 'hmpalertsvc'
            - 'cyaborgs'
            - 'Tanium'
            - 'EventLog'
            - 'Sysmon'

    # sc.exe set start type to disabled
    selection_sc_disable:
        Image|endswith: '\sc.exe'
        CommandLine|contains: 'config '
        CommandLine|contains: 'start= disabled'

    # net stop security services
    selection_net_stop:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains: 'stop '
        CommandLine|contains:
            - 'WinDefend'
            - 'MpsSvc'
            - 'wscsvc'
            - 'SecurityHealthService'
            - 'Sense'
            - 'EventLog'
            - 'Sysmon'

    # taskkill targeting security processes
    selection_taskkill:
        Image|endswith: '\taskkill.exe'
        CommandLine|contains:
            - 'MsMpEng'
            - 'MpCmdRun'
            - 'NisSrv'
            - 'SecurityHealthSystray'
            - 'SenseIR'
            - 'SenseCncProxy'
            - 'MBAMProtector'
            - 'CSFalconService'
            - 'cb.exe'
            - 'SentinelServiceHost'

    # PowerShell Set-Service to disable
    selection_ps_disable:
        CommandLine|contains:
            - 'Set-Service'
            - 'Stop-Service'
        CommandLine|contains:
            - 'WinDefend'
            - 'MpsSvc'
            - 'Sense'
            - 'SecurityHealthService'
            - '-StartupType Disabled'

    condition: 1 of selection_*
falsepositives:
    - Authorized security tool maintenance or migration
    - Legitimate EDR agent upgrades
level: critical
