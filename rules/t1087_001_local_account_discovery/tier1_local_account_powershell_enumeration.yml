title: Local Account Enumeration via PowerShell/WMI
id: f7c3d9a1-1087-4de0-b8c7-unified-t1087102
related:
  - id: sigmahq-posh-local-user
    type: derived
  - id: elastic-local-user-discovery
    type: derived
status: experimental
description: |
  Detects local account enumeration via PowerShell cmdlets (Get-LocalUser,
  Get-LocalGroupMember), WMI queries (Win32_UserAccount), and icacls/cacls
  for permission enumeration. Attackers use these to identify local accounts
  and their group memberships.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1087/001/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1087.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell_local:
    CommandLine|contains:
      - 'Get-LocalUser'
      - 'Get-LocalGroup'
      - 'Get-LocalGroupMember'
      - 'Get-WmiObject Win32_UserAccount'
      - 'Get-CimInstance Win32_UserAccount'
  selection_cmdkey:
    Image|endswith: '\cmdkey.exe'
    CommandLine|contains:
      - '/list'
  selection_icacls:
    Image|endswith:
      - '\icacls.exe'
      - '\cacls.exe'
    CommandLine|contains:
      - '/T'
      - '/C'
  condition: selection_powershell_local or selection_cmdkey or selection_icacls
falsepositives:
  - Legitimate system administration scripts
  - Security audit tools
level: medium
