title: Suspicious Archive Tool Execution for Data Collection
id: f7c3d9a1-1560-4de0-b8c7-unified-t1560001
related:
  - id: sigmahq-archive-tools
    type: derived
  - id: elastic-data-archive
    type: derived
status: experimental
description: |
  Detects execution of archive tools (7z, WinRAR, zip) targeting sensitive
  directories or using password-protected archives. Attackers collect and
  compress data before exfiltration.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1560/
  - https://attack.mitre.org/techniques/T1560/001/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.collection
  - attack.t1560
  - attack.t1560.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_7z:
    Image|endswith:
      - '\7z.exe'
      - '\7za.exe'
      - '\7zr.exe'
    CommandLine|contains:
      - ' a '
      - ' a -'
  selection_winrar:
    Image|endswith:
      - '\rar.exe'
      - '\WinRAR.exe'
    CommandLine|contains:
      - ' a '
      - ' a -'
  selection_password:
    CommandLine|contains:
      - '-p'
      - '-hp'
      - '-mhe'
      - '-password'
  selection_sensitive_dirs:
    CommandLine|contains:
      - 'C:\Users'
      - 'C:\Windows\System32'
      - '%USERPROFILE%'
      - '%APPDATA%'
      - 'Desktop'
      - 'Documents'
      - '\\\\*\\'
  selection_tar_zip:
    Image|endswith: '\tar.exe'
    CommandLine|contains:
      - '-cf'
      - '-czf'
  condition: (selection_7z or selection_winrar or selection_tar_zip) and (selection_password or selection_sensitive_dirs)
falsepositives:
  - Legitimate backup operations
  - Archive creation by users
level: medium
