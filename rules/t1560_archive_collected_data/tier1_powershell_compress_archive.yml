title: Data Collection via PowerShell Compress-Archive or .NET ZipFile
id: f7c3d9a1-1560-4de0-b8c7-unified-t1560002
related:
  - id: sigmahq-posh-compress
    type: derived
  - id: elastic-powershell-archive
    type: derived
status: experimental
description: |
  Detects data collection and archiving via PowerShell Compress-Archive cmdlet,
  .NET System.IO.Compression.ZipFile, and makecab.exe. Attackers use built-in
  tools to avoid detection from third-party archive tool monitoring.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1560/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.collection
  - attack.t1560
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_compress_archive:
    CommandLine|contains:
      - 'Compress-Archive'
      - 'IO.Compression.ZipFile'
      - 'ZipFile::CreateFromDirectory'
      - 'System.IO.Compression'
  selection_makecab:
    Image|endswith: '\makecab.exe'
    CommandLine|contains:
      - '/d'
      - '/f'
      - '/D'
      - '/F'
  selection_compact:
    Image|endswith: '\compact.exe'
    CommandLine|contains:
      - '/c'
      - '/C'
  selection_suspicious_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  condition: (selection_compress_archive or selection_makecab or selection_compact) and selection_suspicious_parent
falsepositives:
  - Legitimate backup scripts using PowerShell
  - Software packaging tools
level: medium
