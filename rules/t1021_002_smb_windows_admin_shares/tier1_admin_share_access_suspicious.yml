title: Suspicious Administrative Share Access
id: f7c3d9a1-1021-4de0-b8c7-unified-t1021202
related:
  - id: sigmahq-admin-share-access
    type: derived
  - id: elastic-admin-share-lateral
    type: derived
status: experimental
description: |
  Detects suspicious access to Windows administrative shares (ADMIN$, C$, IPC$)
  via net use, copy commands, and file operations to remote UNC paths. Attackers
  use admin shares for file transfer and lateral movement.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1021/002/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_net_use_admin:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - ' use '
    CommandLine|contains:
      - 'ADMIN$'
      - 'C$'
      - 'IPC$'
  selection_copy_to_remote:
    Image|endswith:
      - '\cmd.exe'
      - '\xcopy.exe'
      - '\robocopy.exe'
    CommandLine|contains:
      - '\\\\'
    CommandLine|contains:
      - 'ADMIN$'
      - 'C$'
      - 'copy '
  selection_powershell_copy:
    CommandLine|contains:
      - 'Copy-Item'
      - 'cp '
    CommandLine|contains:
      - '\\\\'
      - 'ADMIN$'
      - 'C$'
  condition: selection_net_use_admin or selection_copy_to_remote or selection_powershell_copy
falsepositives:
  - Legitimate remote administration
  - Software deployment tools
  - Group Policy file distribution
level: high
