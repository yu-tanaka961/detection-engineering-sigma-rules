title: PsExec/SMB Lateral Movement via Admin Shares
id: f7c3d9a1-1021-4de0-b8c7-unified-t1021201
related:
  - id: sigmahq-psexec-execution
    type: derived
  - id: elastic-smb-admin-share
    type: derived
status: experimental
description: |
  Detects lateral movement via PsExec, PaExec, and similar tools using Windows
  administrative shares (ADMIN$, C$, IPC$). These tools copy a service executable
  to the target and execute it via SCM over named pipes.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/psexec
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_psexec:
    Image|endswith:
      - '\PsExec.exe'
      - '\PsExec64.exe'
      - '\paexec.exe'
    CommandLine|contains:
      - '\\'
  selection_psexec_flags:
    CommandLine|contains:
      - 'psexec'
      - 'PsExec'
      - 'paexec'
    CommandLine|contains:
      - '-s '
      - '-d '
      - '-accepteula'
      - '-i '
      - '\\\\'
  selection_impacket_psexec:
    CommandLine|contains:
      - 'psexec.py'
      - 'smbexec.py'
      - 'atexec.py'
      - 'wmiexec.py'
  selection_service_indicator:
    Image|endswith: '\PSEXESVC.exe'
  condition: selection_psexec or selection_psexec_flags or selection_impacket_psexec or selection_service_indicator
falsepositives:
  - Legitimate remote administration using PsExec
  - Software deployment tools
level: high
