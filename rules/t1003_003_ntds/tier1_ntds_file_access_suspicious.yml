title: Suspicious Access to NTDS.dit File
id: f7c3d9a1-3002-4de0-b8c7-unified-t1003003
related:
    - id: e5f6a7b8-9c0d-1e2f-unified-t1003003file  # Elastic NTDS file
      type: derived
status: test
description: |
    Detects direct file operations on NTDS.dit outside of normal AD
    maintenance. Adversaries may copy the NTDS.dit file using tools
    like esentutl.exe, robocopy, or raw file copy to extract password
    hashes offline. Also detects secretsdump-style remote NTDS extraction.
    Unified from:
    - Elastic credential_access_ntds_file_access.toml
    - SigmaHQ proc_creation_win_ntds_access.yml
    - Splunk ESCU (NTDS File Access)
references:
    - https://attack.mitre.org/techniques/T1003/003/
author: Yuhei Tanaka (Unified from Elastic, SigmaHQ, Splunk)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1003.003
    - x-source.elastic-detection-rules
    - x-source.sigmahq
    - x-source.splunk-escu
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # esentutl copy of NTDS.dit
    selection_esentutl:
        Image|endswith: '\esentutl.exe'
        CommandLine|contains:
            - 'ntds'
            - 'NTDS'

    # Copy/xcopy/robocopy targeting NTDS.dit
    selection_file_copy:
        CommandLine|contains:
            - 'copy '
            - 'xcopy '
            - 'robocopy '
            - 'Copy-Item'
        CommandLine|contains:
            - 'ntds.dit'
            - 'NTDS.dit'
            - 'NTDS\ntds.dit'

    # Impacket secretsdump NTDS
    selection_secretsdump:
        CommandLine|contains:
            - 'secretsdump'
            - '-ntds '
            - '-just-dc'
            - '-just-dc-ntlm'

    # NTDS.dit access via diskshadow
    selection_diskshadow:
        Image|endswith: '\diskshadow.exe'
        CommandLine|contains:
            - 'script'
            - 'set context'
            - 'expose'

    condition: 1 of selection_*
falsepositives:
    - Authorized AD database maintenance
    - Domain controller migration
level: critical
