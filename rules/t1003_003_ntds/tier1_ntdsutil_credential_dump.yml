title: NTDS.dit Credential Dump via ntdsutil or Volume Shadow Copy
id: f7c3d9a1-3001-4de0-b8c7-unified-t1003003
related:
    - id: d4e5f6a7-8b9c-0d1e-unified-t1003003ntds  # SigmaHQ NTDS dump
      type: derived
status: test
description: |
    Detects attempts to dump the Active Directory database (NTDS.dit)
    using ntdsutil.exe IFM (Install From Media) or by creating volume
    shadow copies to access the locked NTDS.dit file. The NTDS.dit
    contains all AD account password hashes and is the primary target
    for domain-wide credential compromise.
    Unified from:
    - SigmaHQ proc_creation_win_ntdsutil.yml
    - Elastic credential_access_ntds_dump.toml
    - Splunk ESCU (NTDS Credential Dump)
    - Azure Sentinel (NTDS.dit Access)
references:
    - https://attack.mitre.org/techniques/T1003/003/
    - https://adsecurity.org/?p=2398
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.credential_access
    - attack.t1003.003
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # ntdsutil IFM (Install From Media)
    selection_ntdsutil_ifm:
        Image|endswith: '\ntdsutil.exe'
        CommandLine|contains:
            - 'ifm'
            - 'IFM'
            - 'ac i ntds'
            - '"activate instance ntds"'
            - 'create full'

    # ntdsutil snapshot
    selection_ntdsutil_snapshot:
        Image|endswith: '\ntdsutil.exe'
        CommandLine|contains:
            - 'snapshot'
            - 'mount'

    # vssadmin create shadow for NTDS
    selection_vss_ntds:
        Image|endswith:
            - '\vssadmin.exe'
            - '\wmic.exe'
        CommandLine|contains:
            - 'create shadow'
            - 'shadowcopy create'

    # Copy NTDS.dit from shadow copy
    selection_copy_ntds:
        CommandLine|contains:
            - 'ntds.dit'
            - 'NTDS.dit'
            - 'ntds.DIT'

    # PowerShell NTDS dump
    selection_ps_ntds:
        CommandLine|contains:
            - 'NTDSUtil'
            - 'Invoke-NtdsAudit'
            - 'Get-ADDBAccount'
            - 'DSInternals'

    condition: 1 of selection_*
falsepositives:
    - Legitimate AD backup using ntdsutil IFM
    - Domain controller disaster recovery
level: critical
