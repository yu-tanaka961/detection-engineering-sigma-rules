title: Remote File Download via LOLBin or Suspicious Tools
id: f7c3d9a1-1105-4de0-b8c7-unified-t1105a01
status: experimental
description: |
  Detects file download attempts using LOLBins (certutil, bitsadmin, curl, wget) and
  PowerShell web request cmdlets commonly abused for ingress tool transfer.
  Unified detection logic from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel.
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.command_and_control
  - attack.t1105
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_certutil:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - 'urlcache'
      - '-urlcache'
      - '/urlcache'
      - 'verifyctl'
      - '-split'
  selection_bitsadmin:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - '/addfile'
  selection_powershell_download:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'iwr '
      - 'wget '
      - 'curl '
      - 'Net.WebClient'
      - 'DownloadFile'
      - 'DownloadString'
      - 'Start-BitsTransfer'
      - 'Invoke-RestMethod'
      - 'irm '
  selection_curl_wget:
    Image|endswith:
      - '\curl.exe'
      - '\wget.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - '-o '
      - '--output'
  condition: 1 of selection_*
falsepositives:
  - Legitimate administrative downloads
  - Software deployment scripts
  - Patch management tools
level: high
x-log-requirement:
  source: Sysmon EventID 1 / Security 4688
  requirement: Process command line logging enabled
