title: KRBTGT Hash Extraction Tool Execution
id: f7c3d9a1-5581-4de0-b8c7-unified-t1558001
related:
  - id: sigmahq-mimikatz-golden-ticket
    type: derived
  - id: elastic-golden-ticket-tools
    type: derived
status: experimental
description: |
  Detects execution of tools used to extract the KRBTGT account hash or forge
  Golden Tickets, including Mimikatz lsadump::dcsync /user:krbtgt, Rubeus golden,
  Impacket ticketer, and similar tools.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1558/001/
  - https://adsecurity.org/?p=1640
  - https://github.com/gentilkiwi/mimikatz
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.credential_access
  - attack.t1558.001
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_mimikatz_golden:
    CommandLine|contains:
      - 'kerberos::golden'
      - 'kerberos::ptt'
      - 'lsadump::dcsync'
  selection_mimikatz_krbtgt:
    CommandLine|contains:
      - 'krbtgt'
      - 'KRBTGT'
  selection_rubeus_golden:
    CommandLine|contains:
      - 'Rubeus'
      - 'rubeus'
    CommandLine|contains:
      - 'golden'
      - 'silver'
      - 'diamond'
      - 'ptt'
      - '/rc4:'
      - '/aes256:'
  selection_impacket:
    CommandLine|contains:
      - 'ticketer.py'
      - 'ticketer '
      - 'getST.py'
      - '-nthash '
      - '-aesKey '
  condition: (selection_mimikatz_golden and selection_mimikatz_krbtgt) or selection_rubeus_golden or selection_impacket
falsepositives:
  - Security assessment tools during authorized penetration testing
level: critical
