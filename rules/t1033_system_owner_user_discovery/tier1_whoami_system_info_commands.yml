title: System Owner/User Discovery via whoami and System Info Commands
id: f7c3d9a1-1033-4de0-b8c7-unified-t1033001
related:
  - id: sigmahq-whoami-execution
    type: derived
  - id: elastic-system-owner-discovery
    type: derived
status: experimental
description: |
  Detects system owner and user discovery via whoami, quser, query user,
  hostname, and systeminfo commands. While individually benign, these commands
  are commonly executed in sequence during post-compromise reconnaissance.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1033/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1033
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_whoami:
    Image|endswith: '\whoami.exe'
  selection_whoami_args:
    CommandLine|contains:
      - '/all'
      - '/priv'
      - '/groups'
      - '/user'
  selection_query_user:
    Image|endswith:
      - '\quser.exe'
      - '\query.exe'
    CommandLine|contains:
      - 'user'
      - 'session'
  selection_hostname:
    Image|endswith: '\hostname.exe'
  selection_suspicious_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition: (selection_whoami and selection_whoami_args and selection_suspicious_parent) or (selection_query_user and selection_suspicious_parent) or (selection_whoami and selection_suspicious_parent)
falsepositives:
  - Legitimate system administration scripts
  - User running whoami for troubleshooting
level: medium
