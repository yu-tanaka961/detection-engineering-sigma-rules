title: Rapid Reconnaissance Command Sequence (User/System Discovery)
id: f7c3d9a1-1033-4de0-b8c7-unified-t1033003
related:
  - id: elastic-recon-sequence
    type: derived
  - id: splunk-discovery-sequence
    type: derived
status: experimental
description: |
  Detects rapid execution of multiple discovery commands (whoami, hostname,
  ipconfig, net user, systeminfo) within a short timeframe, which is a strong
  indicator of post-compromise reconnaissance. Individual commands are benign
  but the rapid sequence is characteristic of attacker behavior.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1033/
  - https://attack.mitre.org/techniques/T1082/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1033
  - attack.t1082
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-source.azure-sentinel
  - x-evasion-resistance.high
  - x-drs.dq-coverage
  - x-drs.ed-log-evasion-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_recon_tools:
    Image|endswith:
      - '\whoami.exe'
      - '\hostname.exe'
      - '\ipconfig.exe'
      - '\systeminfo.exe'
      - '\tasklist.exe'
      - '\quser.exe'
      - '\netstat.exe'
  selection_net_recon:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - ' user'
      - ' localgroup'
      - ' group'
      - ' config'
  selection_suspicious_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: (selection_recon_tools or selection_net_recon) and selection_suspicious_parent
  timeframe: 5m
  | count() by ParentProcessId >= 4
falsepositives:
  - System administration scripts running multiple checks
  - Monitoring tools performing health checks
level: high
