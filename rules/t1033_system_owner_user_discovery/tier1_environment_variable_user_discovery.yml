title: User Discovery via Environment Variables and WMI
id: f7c3d9a1-1033-4de0-b8c7-unified-t1033002
related:
  - id: sigmahq-env-var-discovery
    type: derived
  - id: splunk-user-discovery
    type: derived
status: experimental
description: |
  Detects user discovery via environment variable access (%USERNAME%, %USERDOMAIN%),
  WMI Win32_ComputerSystem queries, and registry queries for logged-on users.
  Attackers use these methods to identify the current user context and domain.
  Unified from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel detection logic.
references:
  - https://attack.mitre.org/techniques/T1033/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.discovery
  - attack.t1033
  - x-source.sigmahq
  - x-source.splunk-escu
  - x-source.elastic-detection-rules
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_set_cmd:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - ' set '
      - 'echo %USERNAME%'
      - 'echo %USERDOMAIN%'
      - 'echo %LOGONSERVER%'
      - 'echo %COMPUTERNAME%'
  selection_wmi_user:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'ComputerSystem'
      - 'UserAccount'
      - 'LogonSession'
    CommandLine|contains:
      - 'get'
      - 'list'
  selection_reg_logon:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Authentication\\LogonUI'
      - 'HKCU\\Volatile Environment'
  condition: selection_set_cmd or selection_wmi_user or selection_reg_logon
falsepositives:
  - Legitimate administration scripts
  - Login scripts querying user environment
level: low
