title: Suspicious Scheduled Task Creation via schtasks.exe
id: f7c3d9a1-1001-4de0-b8c7-unified-t1053005
related:
    - id: af4c4d80-3d3f-43b0-9e0b-70f73f3c7c12  # SigmaHQ schtasks creation
      type: derived
status: test
description: |
    Detects creation of scheduled tasks using schtasks.exe with suspicious
    parameters such as execution of scripts, LOLBins, or binaries from
    temporary directories. Scheduled tasks are a common persistence and
    execution mechanism for threat actors.
    Unified from:
    - SigmaHQ proc_creation_win_schtasks_creation.yml
    - Elastic persistence_suspicious_schtask_creation.toml
    - Splunk ESCU (Scheduled Task Creation)
    - Azure Sentinel (Suspicious Scheduled Task Creation)
references:
    - https://attack.mitre.org/techniques/T1053/005/
    - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_schtasks_creation.yml
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.execution
    - attack.persistence
    - attack.t1053.005
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\schtasks.exe'
        - OriginalFileName: 'schtasks.exe'

    selection_create:
        CommandLine|contains: '/Create'

    # Suspicious action targets
    selection_action_shell:
        CommandLine|contains:
            - 'cmd.exe'
            - 'cmd /c'
            - 'powershell'
            - 'pwsh'
            - 'mshta'
            - 'wscript'
            - 'cscript'
            - 'rundll32'
            - 'regsvr32'
            - 'certutil'
            - 'bitsadmin'

    # Suspicious paths in task action
    selection_action_path:
        CommandLine|contains:
            - '\Temp\'
            - '\tmp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\ProgramData\'
            - '\Downloads\'
            - '\Desktop\'
            - 'http://'
            - 'https://'

    # Encoded command in task
    selection_action_encoded:
        CommandLine|contains:
            - '-encodedcommand'
            - '-enc '
            - '-e '
            - 'FromBase64String'

    # SYSTEM privilege task creation
    selection_system:
        CommandLine|contains:
            - '/RU SYSTEM'
            - '/RU "SYSTEM"'
            - '/ru system'

    # Filter: Windows Update and legitimate task management
    filter_main_windows_update:
        CommandLine|contains: '\Microsoft\Windows\UpdateOrchestrator'
    filter_main_defender:
        CommandLine|contains: '\Microsoft\Windows Defender'

    condition: selection_img and selection_create and (selection_action_shell or selection_action_path or selection_action_encoded or selection_system) and not 1 of filter_*
falsepositives:
    - Legitimate administrative scheduled tasks
    - Software deployment creating maintenance tasks
    - Monitoring tools creating health check tasks
level: high
