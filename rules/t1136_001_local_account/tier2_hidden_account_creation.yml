title: Hidden Local Account Creation
id: f7c3d9a1-1403-4de0-b8c7-unified-t1136001
related:
    - id: d4e5f6a7-8b9c-0d1e-2f3a-4b5c6d7e8f9a  # SigmaHQ hidden account
      type: derived
status: test
description: |
    Detects creation of hidden local accounts using the $ suffix trick
    or registry manipulation to hide accounts from the logon screen.
    Accounts ending with $ are hidden from 'net user' output, and
    registry modifications to SAM can hide accounts from the GUI.
    Unified from:
    - SigmaHQ proc_creation_win_hidden_account.yml
    - Elastic persistence_hidden_account_creation.toml
    - Splunk ESCU (Hidden Local Account Creation)
references:
    - https://attack.mitre.org/techniques/T1136/001/
    - https://attack.mitre.org/techniques/T1564/002/
    - https://blog.talosintelligence.com/2019/11/custom-dropper-hide-user.html
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk)
date: 2026/06/28
tags:
    - attack.persistence
    - attack.defense_evasion
    - attack.t1136.001
    - attack.t1564.002
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # net user with $ suffix (hidden account)
    selection_net_hidden:
        - Image|endswith:
              - '\net.exe'
              - '\net1.exe'
        - OriginalFileName:
              - 'net.exe'
              - 'net1.exe'

    selection_net_hidden_cmd:
        CommandLine|contains|all:
            - 'user'
            - '/add'
        CommandLine|re: 'user\s+\S+\$\s'

    # Registry manipulation to hide account
    selection_reg_hide:
        Image|endswith:
            - '\reg.exe'
            - '\regedit.exe'
        CommandLine|contains:
            - 'SAM\SAM\Domains\Account\Users'
            - 'SpecialAccounts\UserList'

    condition: (selection_net_hidden and selection_net_hidden_cmd) or selection_reg_hide
falsepositives:
    - Legitimate machine accounts (these end with $ but are domain-joined)
    - Security software creating hidden service accounts
level: critical
