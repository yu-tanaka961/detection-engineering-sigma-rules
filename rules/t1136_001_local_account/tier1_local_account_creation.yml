title: Local Account Creation via Command Line
id: f7c3d9a1-1401-4de0-b8c7-unified-t1136001
related:
    - id: 66b6be3d-55d0-4f47-9c51-8bc8b3a15928  # SigmaHQ net user add
      type: derived
status: test
description: |
    Detects creation of local user accounts via net.exe, net1.exe, or
    PowerShell cmdlets. Local account creation is a common persistence
    and privilege escalation technique used after initial compromise.
    Unified from:
    - SigmaHQ proc_creation_win_net_user_add.yml
    - Elastic persistence_local_account_creation.toml
    - Splunk ESCU (Create Local Admin Accounts Using Net.exe)
    - Azure Sentinel (Local Account Created)
references:
    - https://attack.mitre.org/techniques/T1136/001/
    - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_net_user_add.yml
author: Yuhei Tanaka (Unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
    - attack.persistence
    - attack.t1136.001
    - x-source.sigmahq
    - x-source.elastic-detection-rules
    - x-source.splunk-escu
    - x-source.azure-sentinel
    - x-evasion-resistance.medium
    - x-drs.dq-coverage
logsource:
    category: process_creation
    product: windows
detection:
    # net.exe / net1.exe user add
    selection_net:
        - Image|endswith:
              - '\net.exe'
              - '\net1.exe'
        - OriginalFileName:
              - 'net.exe'
              - 'net1.exe'

    selection_net_add:
        CommandLine|contains|all:
            - 'user'
            - '/add'

    # PowerShell account creation
    selection_powershell:
        - Image|endswith:
              - '\powershell.exe'
              - '\pwsh.exe'
        - OriginalFileName:
              - 'PowerShell.EXE'
              - 'pwsh.dll'

    selection_ps_cmdlet:
        CommandLine|contains:
            - 'New-LocalUser'
            - 'Add-LocalGroupMember'

    # WMI-based account creation
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains|all:
            - 'useraccount'
            - 'create'

    condition: (selection_net and selection_net_add) or (selection_powershell and selection_ps_cmdlet) or selection_wmic
falsepositives:
    - Legitimate user provisioning by IT administrators
    - Automated account creation by deployment scripts
    - Domain join processes creating local accounts
level: high
