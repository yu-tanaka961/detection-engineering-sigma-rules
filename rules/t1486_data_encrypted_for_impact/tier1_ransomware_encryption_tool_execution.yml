title: Ransomware Encryption Tool or Suspicious Crypto Operations
id: f7c3d9a1-1486-4de0-b8c7-unified-t1486a02
status: experimental
description: |
  Detects execution of known ransomware tools and suspicious encryption operations
  using cipher.exe, BitLocker, and PowerShell encryption cmdlets.
  Unified detection logic from SigmaHQ, Elastic, Splunk ESCU, and Azure Sentinel.
references:
  - https://attack.mitre.org/techniques/T1486/
author: Yuhei Tanaka (unified from SigmaHQ, Elastic, Splunk, Sentinel)
date: 2026/06/28
tags:
  - attack.impact
  - attack.t1486
  - x-source.sigmahq
  - x-source.elastic-detection-rules
  - x-source.splunk-escu
  - x-evasion-resistance.medium
  - x-drs.dq-coverage
  - x-drs.ed-tool-change-resistance
logsource:
  category: process_creation
  product: windows
detection:
  selection_cipher_wipe:
    Image|endswith: '\cipher.exe'
    CommandLine|contains:
      - '/w:'
      - '/e '
      - '/d '
  selection_bitlocker_abuse:
    CommandLine|contains:
      - 'manage-bde'
      - 'Enable-BitLocker'
      - 'Lock-BitLocker'
    CommandLine|contains:
      - '-RecoveryPassword'
      - '-EncryptionMethod'
      - '-UsedSpaceOnly'
      - '-Password'
  selection_openssl_encrypt:
    Image|endswith: '\openssl.exe'
    CommandLine|contains:
      - 'enc '
      - '-aes'
      - '-des'
      - '-encrypt'
  selection_gpg_encrypt:
    Image|endswith:
      - '\gpg.exe'
      - '\gpg2.exe'
    CommandLine|contains:
      - '--symmetric'
      - '--encrypt'
      - '-c '
      - '-e '
  condition: 1 of selection_*
falsepositives:
  - Legitimate disk encryption by IT administrators
  - Authorized file encryption operations
  - BitLocker deployment via GPO
level: high
x-log-requirement:
  source: Sysmon EventID 1 / Security 4688
  requirement: Process command line logging enabled
